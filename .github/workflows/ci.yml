name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Install perlcritic
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libperl-critic-perl

      - name: Lint
        run: |
          perlcritic --severity 3 \
            --exclude "Modules::RequireBarewordIncludes" \
            --exclude "Modules::RequireFilenameMatchesPackage" \
            --exclude "ValuesAndExpressions::ProhibitLiteralStringLineBreaks" \
            --exclude "BuiltinFunctions::RequireCheckingReturnValueOfEval" \
            --exclude "Subroutines::RequireFinalReturn" \
            --exclude "ControlStructures::ProhibitUnlessWithElse" \
            EclecticShuffle/*.pm t/*.t

      - name: Test
        run: prove -l t/
