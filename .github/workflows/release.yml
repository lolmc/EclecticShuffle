name: Release
permissions:
  contents: write
  actions: read

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Install perlcritic
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libperl-critic-perl

      - name: Lint
        run: perlcritic --severity 4 EclecticShuffle/*.pm || true

      - name: Test
        run: prove -l t/

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build zip and inject SHA
        id: build
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          ZIP="EclecticShuffle-${VERSION}.zip"

          # Build initial zip
          zip -r "$ZIP" EclecticShuffle/ \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"

          # Compute SHA256
          SHA=$(sha256sum "$ZIP" | cut -d' ' -f1)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

          # Inject correct url and sha into repo.xml
          sed -i "s|<url>.*</url>|<url>https://github.com/lolmc/EclecticShuffle/releases/download/${TAG}/EclecticShuffle-${VERSION}.zip</url>|" repo.xml
          sed -i "s|<sha>.*</sha>|<sha>${SHA}</sha>|" repo.xml

          # Inject sha into the zip's install.xml
          cd EclecticShuffle
          sed -i "s|<sha>.*</sha>|<sha>${SHA}</sha>|" install.xml
          cd ..

          # Rebuild zip with updated install.xml
          rm -f "$ZIP"
          zip -r "$ZIP" EclecticShuffle/ \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"

          ls -la "$ZIP" repo.xml

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA: ${{ steps.build.outputs.sha }}
        run: |
          set -ex

          # Build release body using echo (safe inside YAML | block)
          echo '## EclecticShuffle '"${TAG}" > .release-notes.md
          echo '' >> .release-notes.md
          echo 'Install: download the zip below, then LMS Settings -> Plugins -> Install from file.' >> .release-notes.md
          echo '' >> .release-notes.md
          echo '**Or add the repository:**' >> .release-notes.md
          echo '1. LMS Settings -> Plugins -> Add Repository' >> .release-notes.md
          echo '2. Enter: `https://github.com/lolmc/EclecticShuffle/releases/latest/download/repo.xml`' >> .release-notes.md
          echo '3. Click OK and restart LMS.' >> .release-notes.md
          echo '' >> .release-notes.md
          echo 'SHA256: `'"${SHA}"'`' >> .release-notes.md

          # Ensure jq is installed
          sudo apt-get install -y -qq jq >/dev/null 2>&1

          # Create release via API
          echo "Creating release for tag ${TAG}..."
          RELEASE=$(curl -f -X POST \
            "https://api.github.com/repos/lolmc/EclecticShuffle/releases" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"EclecticShuffle ${TAG}\",
              \"body\": $(jq -Rs . < .release-notes.md),
              \"draft\": false,
              \"prerelease\": false
            }")

          RELEASE_ID=$(echo "$RELEASE" | jq -r .id)
          echo "Release ID: ${RELEASE_ID}"

          # Upload zip
          curl -sf -X POST \
            "https://uploads.github.com/repos/lolmc/EclecticShuffle/releases/${RELEASE_ID}/assets?name=EclecticShuffle-${TAG#v}.zip" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/zip" \
            --data-binary "@EclecticShuffle-${TAG#v}.zip"

          # Upload repo.xml
          curl -sf -X POST \
            "https://uploads.github.com/repos/lolmc/EclecticShuffle/releases/${RELEASE_ID}/assets?name=repo.xml" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/xml" \
            --data-binary "@repo.xml"

          echo "Release ${TAG} published."
